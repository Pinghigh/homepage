name: Build and Deploy
on: [push]
jobs:
    build-and-deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout 🛎️
              uses: actions/checkout@main

            - name: Install and Build 🔧
              run: |
                  yarn
                  yarn build

            - name: Deploy 🚀
              uses: JamesIves/github-pages-deploy-action@release/v4.4.2
              with:
                  token: ${{ secrets.ACCESS_TOKEN }}
                  branch: pages
                  folder: dist
